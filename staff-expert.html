<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>员工达人计划 - 国创等立信息网</title>
    <meta name="description" content="员工达人计划，展示优秀员工风采，分享专业知识与经验">
    <meta name="keywords" content="员工达人,优秀员工,员工风采,专业知识">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0d1117;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans', Helvetica, Arial, sans-serif;
            color: #e6edf3;
            line-height: 1.5;
            padding: 2rem 1rem;
        }

        .repository-container {
            max-width: 1280px;
            margin: 0 auto;
            background-color: #0d1117;
            border: 1px solid #30363d;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        }

        .repo-header {
            padding: 1rem 1.5rem;
            background-color: #010409;
            border-bottom: 1px solid #30363d;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 0.75rem;
        }
        .repo-icon {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }
        .repo-icon svg {
            fill: #7d8590;
        }
        .repo-path {
            font-weight: 600;
            font-size: 16px;
        }
        .repo-path span {
            color: #8b949e;
        }
        .repo-badge {
            background-color: #21262d;
            padding: 0.2rem 0.6rem;
            border-radius: 24px;
            font-size: 12px;
            font-family: monospace;
        }

        .repo-tabs {
            display: flex;
            background-color: #010409;
            border-bottom: 1px solid #30363d;
            padding: 0 1.5rem;
            gap: 1.5rem;
            overflow-x: auto;
        }
        .tab {
            padding: 0.75rem 0;
            font-size: 14px;
            color: #8b949e;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .tab:hover {
            color: #e6edf3;
            border-bottom-color: #8b949e;
        }
        .tab.active {
            color: #f78166;
            border-bottom-color: #f78166;
            font-weight: 600;
        }
        .tab a {
            color: inherit;
            text-decoration: none;
        }

        .repo-content {
            padding: 1.5rem;
        }

        .page-title {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: #f0f6fc;
            border-bottom: 1px solid #30363d;
            padding-bottom: 1rem;
        }

        .page-subtitle {
            font-size: 1rem;
            color: #8b949e;
            margin-bottom: 2rem;
        }

        .expert-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-top: 2rem;
        }

        .expert-card {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 1.5rem;
            transition: transform 0.2s, border-color 0.2s;
        }

        .expert-card:hover {
            transform: translateY(-4px);
            border-color: #58a6ff;
        }

        .expert-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #f78166, #58a6ff);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            margin-bottom: 1rem;
        }

        .expert-name {
            font-size: 1.25rem;
            font-weight: 600;
            color: #f0f6fc;
            margin-bottom: 0.25rem;
        }

        .expert-title {
            font-size: 0.875rem;
            color: #58a6ff;
            margin-bottom: 0.75rem;
        }

        .expert-desc {
            font-size: 0.875rem;
            color: #8b949e;
            line-height: 1.6;
        }

        .expert-stats {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid #30363d;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 1.25rem;
            font-weight: 700;
            color: #f78166;
        }

        .stat-label {
            font-size: 0.75rem;
            color: #8b949e;
        }

        .image-placeholder {
            width: 100%;
            height: 200px;
            background-color: #21262d;
            border: 2px dashed #30363d;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #8b949e;
            margin: 1rem 0;
            cursor: pointer;
        }

        .image-placeholder:hover {
            border-color: #58a6ff;
            color: #58a6ff;
        }

        .section-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin: 2rem 0 1rem;
            color: #f0f6fc;
        }

        .intro-section {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 2rem;
            margin-bottom: 2rem;
        }

        .intro-text {
            font-size: 1rem;
            line-height: 1.8;
            color: #c9d1d9;
        }

        @media (max-width: 768px) {
            .expert-grid {
                grid-template-columns: 1fr;
            }
            .page-title {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
<div class="repository-container">
    <div class="repo-header">
        <div class="repo-icon">
            <svg height="20" viewBox="0 0 16 16" width="20" xmlns="http://www.w3.org/2000/svg"><path fill="#7d8590" d="M2 2.5A2.5 2.5 0 0 1 4.5 0h8.75a.75.75 0 0 1 .75.75v12.5a.75.75 0 0 1-.75.75h-2.5a.75.75 0 0 1 0-1.5h1.75v-2h-8a1 1 0 0 0-.714 1.7.75.75 0 1 1-1.072 1.05A2.495 2.495 0 0 1 2 11.5Zm10.5-1h-8a1 1 0 0 0-1 1v6.708A2.486 2.486 0 0 1 4.5 9h8ZM8 2.75a.75.75 0 0 1 .75.75v3.19l.72-.72a.75.75 0 0 1 1.06 1.06l-2 2a.75.75 0 0 1-1.06 0l-2-2a.75.75 0 1 1 1.06-1.06l.72.72V3.5A.75.75 0 0 1 8 2.75Z"/></svg>
            <span class="repo-path"><span>sobriety-labs</span> / <strong>staff-expert</strong></span>
        </div>
        <div class="repo-badge">Employee Expert Program</div>
    </div>

    <div class="repo-tabs">
        <div class="tab"><a href="index.html">🏠 <span>首页</span></a></div>
        <div class="tab"><a href="product.html">📦 <span>产品详情</span></a></div>
        <div class="tab"><a href="ingredients.html">🧬 <span>成分说明</span></a></div>
        <div class="tab"><a href="clinical.html">📊 <span>专利数据</span></a></div>
        <div class="tab active">⭐ <span>员工达人</span></div>
    </div>

    <div class="repo-content">
        <div style="text-align: center; padding: 1rem;">
            <img src="20260522-171757.png" alt="员工达人招募令" style="max-width: 100%; height: auto; border-radius: 8px;">
        </div>
    </div>
</div>
</body>
</html>
